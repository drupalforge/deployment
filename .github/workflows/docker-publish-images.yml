name: Build and publish deployment images
on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  check-tests-success:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      php_versions: ${{ steps.set-matrix.outputs.php_versions }}
    steps:
      - name: Verify build prerequisites
        run: echo "Preconditions satisfied, proceeding with image build"
      - name: Set PHP versions matrix
        id: set-matrix
        run: echo 'php_versions=["8.2","8.3"]' >> "$GITHUB_OUTPUT"

  build:
    needs: check-tests-success
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ${{ fromJson(needs.check-tests-success.outputs.php_versions) }}
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract CMD from base image
        id: extract-cmd
        run: |
          BASE_IMAGE="devpanel/php:${{ matrix.php_version }}-base-rc"
          echo "Pulling base image: ${BASE_IMAGE}"
          docker pull "${BASE_IMAGE}"

          echo "Extracting CMD from base image..."
          BASE_CMD=$(docker inspect "${BASE_IMAGE}" --format='{{json .Config.Cmd}}' | jq -r 'join(" ")')
          echo "Extracted CMD: ${BASE_CMD}"

          echo "base_cmd=${BASE_CMD}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          labels: |
            org.opencontainers.image.title=Drupal Forge Deployment
            org.opencontainers.image.description=Drupal Forge deployment image

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            BASE_CMD=${{ steps.extract-cmd.outputs.base_cmd }}
          # Using GHA cache instead of type=registry due to BuildKit bugs; see TODO.md.
          cache-from: type=gha,scope=${{ matrix.php_version }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.php_version }}-${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          # Artifact names cannot contain '/'; convert linux/amd64 -> linux-amd64
          echo "PLATFORM_TAG=$(echo '${{ matrix.platform }}' | sed 's/\//-/g')" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.php_version }}-${{ env.PLATFORM_TAG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build, check-tests-success]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ${{ fromJson(needs.check-tests-success.outputs.php_versions) }}

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.php_version }}-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}-php-${{ matrix.php_version }}
            type=raw,value=php-${{ matrix.php_version }},enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}-php-${{ matrix.php_version }},enable=${{ github.ref_type == 'branch' && github.ref_name != github.event.repository.default_branch }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
