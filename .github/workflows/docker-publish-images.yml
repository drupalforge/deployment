name: Build and publish deployment images
on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  check-tests-success:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Check tests workflow result
        run: echo "Tests workflow succeeded, proceeding with image build"

  # Per-PHP-version reusable workflow callers removed in favor of an inline
  # matrix-driven `build` job defined below. The reusable workflow file
  # `.github/workflows/docker-publish-image.yml` will be deleted.

  build:
    needs: check-tests-success
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: [ '8.2', '8.3' ]

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract CMD from base image
        id: extract-cmd
        run: |
          BASE_IMAGE="devpanel/php:${{ matrix.php_version }}-base"
          echo "Pulling base image: ${BASE_IMAGE}"
          docker pull "${BASE_IMAGE}"

          echo "Extracting CMD from base image..."
          BASE_CMD=$(docker inspect "${BASE_IMAGE}" --format='{{json .Config.Cmd}}' | jq -r 'join(" ")')
          echo "Extracted CMD: ${BASE_CMD}"

          echo "base_cmd=${BASE_CMD}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub (for build)
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare platform tag
        id: platform-tag
        run: |
          # Use single combined tag for platform matrix compatibility
          echo "tag=linux-amd64" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          labels: |
            org.opencontainers.image.title=Drupal Forge Deployment
            org.opencontainers.image.description=Drupal Forge deployment image

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          pull: true
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            BASE_CMD=${{ steps.extract-cmd.outputs.base_cmd }}
          cache-from: type=gha,scope=${{ matrix.php_version }}-${{ steps.platform-tag.outputs.tag }}
          cache-to: type=gha,scope=${{ matrix.php_version }}-${{ steps.platform-tag.outputs.tag }},mode=max
          outputs: type=image,name=${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.php_version }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
