name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up shell test environment
        run: |
          # Install PHP for syntax checking
          sudo apt-get update
          sudo apt-get install -y php-cli php-curl jq npm
          # Install markdownlint-cli for required Markdown lint unit tests.
          sudo npm install -g markdownlint-cli
          # Install the latest shellcheck release from GitHub to ensure consistency with
          # local development environments (avoids version skew with the apt package).
          SHELLCHECK_VERSION=$(curl -fsSL https://api.github.com/repos/koalaman/shellcheck/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          [ -z "$SHELLCHECK_VERSION" ] && { echo "Failed to fetch shellcheck version"; exit 1; }
          SHELLCHECK_URL="https://github.com/koalaman/shellcheck/releases/download"
          curl -fsSL "${SHELLCHECK_URL}/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJf -
          sudo mv "shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Install PHP CodeSniffer with Drupal coding standard
        run: |
          composer global require "squizlabs/php_codesniffer=*" "drupal/coder=*"
          # Register the Drupal coding standard with phpcs
          "$(composer global config bin-dir --absolute --quiet)/phpcs" \
            --config-set installed_paths \
            "$(composer global config home --quiet)/vendor/drupal/coder/coder_sniffer"
          # Make phpcs available system-wide
          sudo ln -sf "$(composer global config bin-dir --absolute --quiet)/phpcs" /usr/local/bin/phpcs
        env:
          COMPOSER_ALLOW_SUPERUSER: '1'

      - name: Run unit tests
        run: |
          bash tests/unit-test.sh

  docker-build-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run docker build tests
        run: |
          bash tests/docker-build-test.sh

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run integration tests
        run: |
          bash tests/integration-test.sh
